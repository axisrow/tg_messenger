<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>tg_messenger</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; }
    #dialogs { width: 300px; border-right: 1px solid #ccc; overflow-y: auto; }
    #tabs { display: flex; border-bottom: 1px solid #ccc; }
    #tabs .tab { flex: 1; padding: 8px; border: none; background: #f7f7f7; cursor: pointer; }
    #tabs .tab.active { background: #fff; font-weight: bold; border-bottom: 2px solid #2481cc; }
    #dialogs ul { list-style: none; margin: 0; padding: 0; }
    #dialogs li { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    #dialogs li:hover { background: #f3f3f3; }
    .unread { background: #2481cc; color: #fff; border-radius: 10px; padding: 0 6px; font-size: 12px; }
    #chat { flex: 1; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 12px; }
    .msg { max-width: 60%; margin: 4px 0; padding: 8px 12px; border-radius: 12px; }
    .msg.in { background: #eee; }
    .msg.out { background: #cfe9ff; margin-left: auto; }
    /* #106: reactions attach UNDER their message as one accumulating line, not a separate bubble */
    .reactions { margin-top: 4px; font-size: 15px; }
    .translation { margin-top: 4px; color: #555; font-size: 13px; }
    .reply-btn, .react-btn { margin-left: 6px; border: none; background: transparent; cursor: pointer; font-size: 12px; }
    .reaction-palette { display: inline-flex; gap: 4px; margin-left: 6px; }
    .reaction-palette button { border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; padding: 0 4px; }
    #composer { display: flex; border-top: 1px solid #ccc; padding: 8px; }
    #composer input { flex: 1; padding: 8px; }
    #suggest-error { color: #b00020; padding: 0 8px; align-self: center; font-size: 12px; }
    #variant-panel { border-top: 1px solid #ddd; padding: 8px; display: none; }
    .variant-card { display: block; width: 100%; text-align: left; margin: 4px 0; padding: 8px; }
    /* #97: transient confirmation for a reaction that landed in a dialog the user left */
    #reaction-toast {
      position: fixed; right: 16px; bottom: 16px; max-width: 280px; padding: 8px 12px;
      background: #323232; color: #fff; border-radius: 6px; font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 1000;
    }
    #reaction-toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <aside id="dialogs">
    <nav id="tabs">
      <button class="tab active" hx-get="/dialogs?tab=dm"
              hx-target="#dialogs ul" hx-swap="innerHTML"
              hx-on:click="document.getElementById('dialog-search').value=''">DM</button>
      <button class="tab" hx-get="/dialogs?tab=groups"
              hx-target="#dialogs ul" hx-swap="innerHTML"
              hx-on:click="document.getElementById('dialog-search').value=''">Группы</button>
    </nav>
    <input type="search" id="dialog-search" name="q" placeholder="Поиск диалогов…"
           autocomplete="off"
           hx-get="/dialogs" hx-trigger="input changed delay:200ms, search"
           hx-include="#current-tab" hx-target="#dialogs ul" hx-swap="innerHTML">
    <input type="hidden" id="current-tab" name="tab" value="dm">
    <ul hx-get="/dialogs" hx-trigger="load" hx-target="#dialogs ul" hx-swap="innerHTML"></ul>
  </aside>
  <main id="chat">
    <div id="messages"></div>
    <div id="reaction-toast" role="status" aria-live="polite"></div>
    <div id="lang-settings" hx-get="/settings/lang" hx-trigger="load" hx-swap="innerHTML"></div>
    <div id="variant-panel" role="status"></div>
    <div id="reply-banner" style="display:none; padding: 4px 8px; font-size: 12px; color: #555; border-top: 1px solid #eee;">
      <span id="reply-banner-text"></span>
      <button type="button" id="reply-cancel" title="Cancel reply">✕</button>
    </div>
    <form id="composer" hx-post="/send" hx-target="#messages" hx-swap="beforeend">
      <input type="hidden" name="dialog_id" id="dialog_id" value="">
      <input type="hidden" name="web_client_id" id="web_client_id" value="">
      <input type="hidden" name="outbound_nonce" id="outbound_nonce" value="">
      <input type="hidden" name="reply_to" id="reply_to" value="">
      <input type="text" name="text" id="composer-text" placeholder="Message…" autocomplete="off" required>
      <button type="button" id="suggest-btn" title="Suggest a reply">💡 Suggest</button>
      <label id="attach-btn" title="Attach a file">📎
        <input type="file" id="attach-file" style="display:none">
      </label>
      <span id="suggest-error" role="status"></span>
    </form>
  </main>
  <script>
    const webClientId = (() => {
      let id = sessionStorage.getItem('tgMessengerClientId');
      if (!id) {
        id = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
        sessionStorage.setItem('tgMessengerClientId', id);
      }
      const clientInput = document.getElementById('web_client_id');
      clientInput.value = id;
      clientInput.defaultValue = id;
      return id;
    })();
    // Highlight the active dialog-list tab and remember it for the search box.
    document.getElementById('tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      document.querySelectorAll('#tabs .tab').forEach(t => t.classList.toggle('active', t === tab));
      const hx = tab.getAttribute('hx-get') || '';
      document.getElementById('current-tab').value = hx.includes('groups') ? 'groups' : 'dm';
    });
    // Track selected dialog id from clicks on the list, wire SSE for incoming.
    let es = null;
    document.body.addEventListener('click', (e) => {
      const li = e.target.closest('#dialogs li');
      if (!li) return;
      const id = li.textContent.trim().split(' ')[0];
      saveComposeState();
      restoreComposeState(id);
      setComposerEnabled(li.dataset.canSend !== '0');
      if (es) es.close();
      es = new EventSource('/stream/' + encodeURIComponent(id) +
                           '?client_id=' + encodeURIComponent(webClientId));
      es.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        const div = document.createElement('div');
        if (data.type === 'reaction') {
          // #106: attach under the reacted message (other people's reactions included), not a bubble
          attachReaction(data.message_id, data.emoticon);
          return;
        }
        if (data.type === 'translation') {
          const msg = document.querySelector('.msg[data-id="' + CSS.escape(String(data.message_id)) + '"]');
          if (msg && !msg.querySelector('.translation')) {
            const line = document.createElement('div');
            line.className = 'translation';
            line.textContent = '↳ ' + data.text;
            msg.appendChild(line);
          }
          return;
        }
        // our own messages (sent from another device) render on the right
        div.className = data.out ? 'msg out' : 'msg in';
        div.dataset.id = data.id;
        div.dataset.dialog = id;  // #95: bind the bubble to this stream's dialog (race-safe)
        div.textContent = '[' + data.id + '] ' + (data.text || '<media>');
        // #86: live-arriving bubbles get the same per-message react button as server-rendered
        // ones (built via DOM API so the message text stays safely set via textContent).
        const reactBtn = document.createElement('button');
        reactBtn.type = 'button';
        reactBtn.className = 'react-btn';
        reactBtn.dataset.react = data.id;
        reactBtn.title = 'React';
        reactBtn.textContent = '🙂';
        div.appendChild(reactBtn);
        document.getElementById('messages').appendChild(div);
      };
    });
    // Attach a file: upload it as media to the open dialog, append the bubble.
    document.getElementById('attach-file').addEventListener('change', async (e) => {
      const id = document.getElementById('dialog_id').value;
      const file = e.target.files[0];
      if (!id || !file) { e.target.value = ''; return; }
      // #48: snapshot the reply target as it was when this upload started; `id` is the
      // upload's own dialog. Both are compared after the await so a dialog switch or a
      // newer reply pick made while the upload was in flight isn't clobbered.
      const uploadReplyTo = replyToInput.value;
      const fd = new FormData();
      fd.append('file', file);
      fd.append('caption', document.getElementById('composer-text').value);
      fd.append('web_client_id', webClientId);
      const resp = await fetch('/dialogs/' + id + '/media', { method: 'POST', body: fd });
      const html = await resp.text();
      if (resp.ok) {
        // Clear THIS upload's compose state (clearComposeState only touches the visible
        // composer when its dialog is still active), never currentState() — a dialog
        // switch in flight must not erase the newly-active dialog's draft.
        clearComposeState(stateFor(id));
        // Append the bubble and clear the visible composer/reply banner only if the user
        // is still on this upload's dialog (otherwise the bubble belongs to another chat,
        // and the visible composer/draft is a later action's, not this upload's).
        if (document.getElementById('dialog_id').value === id) {
          document.getElementById('messages').insertAdjacentHTML('beforeend', html);
          document.getElementById('composer-text').value = '';
          // #48: media carries no reply_to, so clear the stale banner — but only if the
          // user hasn't picked a newer target since this upload started (#89 shared helper).
          clearReplyIfConsumed(uploadReplyTo);
        }
      } else {
        alert(html.replace(/<[^>]+>/g, '').trim() || 'Upload failed');
      }
      e.target.value = '';
    });
    // #86: per-message reactions. Each bubble carries a 🙂 react-btn; clicking it toggles a
    // small preset palette, and picking an emoji POSTs to /reaction for that message. React
    // buttons stay live even in a read-only chat (the text composer is disabled, reactions
    // are not). Errors surface inline (no browser dialog) — reactions are best-effort.
    const REACTION_PRESETS = ['👍', '❤️', '🔥', '😂'];
    // #97: exact title for the cross-dialog reaction toast. Matches the dialog-list <li> by its
    // data-dialog attribute and reads the verbatim data-title (both server-rendered by
    // _dialog_li) — never parses the rendered text, so a title containing " @" or trailing
    // digits is no longer over-trimmed (Codex review of #103). Returns null when the chat isn't
    // in the current list DOM (tab switched / search filtered) — the caller then shows a neutral
    // toast rather than "undefined".
    function dialogTitleById(dialogId) {
      const li = document.querySelector('#dialogs li[data-dialog="' + CSS.escape(String(dialogId)) + '"]');
      if (!li) return null;
      const title = li.dataset.title;
      return title ? title.trim() || null : null;
    }
    // #97: transient bottom-right toast, distinct from the red #suggest-error composer line.
    // Re-arms its own timer so a burst of cross-dialog reactions doesn't flicker.
    let reactionToastTimer = null;
    function showToast(text) {
      const toast = document.getElementById('reaction-toast');
      if (!toast) return;
      toast.textContent = text;
      toast.classList.add('show');
      if (reactionToastTimer) clearTimeout(reactionToastTimer);
      reactionToastTimer = setTimeout(() => {
        toast.classList.remove('show');
        reactionToastTimer = null;
      }, 3000);
    }
    // #106: attach a reaction UNDER its target message as one accumulating line (👍 ❤️ 🔥),
    // mirroring how the translation frame appends a line under the message. Shared by the SSE
    // reaction branch (other people's reactions) and the optimistic POST path (our own).
    // Silently no-op when the target isn't in the visible history. Dedup so the same emoji
    // isn't shown twice (our-own optimistic + live echo, or a re-add).
    function attachReaction(messageId, emoticon) {
      const msg = document.querySelector('.msg[data-id="' + CSS.escape(String(messageId)) + '"]');
      if (!msg) return;
      const label = emoticon || '<custom>';
      let line = msg.querySelector('.reactions');
      if (!line) { line = document.createElement('div'); line.className = 'reactions'; msg.appendChild(line); }
      const shown = line.textContent ? line.textContent.split(' ') : [];
      if (shown.includes(label)) return;
      shown.push(label);
      line.textContent = shown.join(' ');
    }
    async function postReaction(messageId, emoticon, dialogId) {
      // #95: react to the dialog the clicked BUBBLE belongs to (dialogId), not the global
      // #dialog_id — which may already point to another chat if a switch is in flight while
      // a stale bubble is still live in the DOM. The append-echo is guarded like the attach
      // path: only show the response fragment if the user is still on that dialog.
      if (!dialogId) dialogId = document.getElementById('dialog_id').value;  // fallback
      if (!dialogId) return;
      const fd = new FormData();
      fd.append('message_id', messageId);
      fd.append('emoticon', emoticon);
      fd.append('web_client_id', webClientId);
      const resp = await fetch('/dialogs/' + encodeURIComponent(dialogId) + '/reaction', {
        method: 'POST',
        body: fd
      });
      if (resp.ok) {
        // #106: the server returns 204 (no body); the optimistic attach is client-side via the
        // same attachReaction path the SSE frame uses, so the reaction lands UNDER its message.
        if (document.getElementById('dialog_id').value === dialogId) {
          attachReaction(messageId, emoticon);
        } else {
          // #97: the reaction landed in a dialog the user has navigated away from. The in-pane
          // attach is (correctly, #95/#96) suppressed to avoid cross-dialog contamination, so
          // confirm with a lightweight toast instead. Title is best-effort — neutral fallback.
          const title = dialogTitleById(dialogId);
          showToast(title ? ('Реакция в ' + title + ' ' + emoticon)
                          : ('Реакция отправлена ' + emoticon));
        }
      } else {
        const html = await resp.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        document.getElementById('suggest-error').textContent =
          (doc.body.textContent || '').trim() || 'Reaction failed.';
      }
    }
    function closeReactionPalettes() {
      document.querySelectorAll('.reaction-palette').forEach(p => p.remove());
    }
    document.getElementById('messages').addEventListener('click', (e) => {
      const reactBtn = e.target.closest('.react-btn');
      if (reactBtn) {
        const bubble = reactBtn.closest('.msg');
        const existing = bubble ? bubble.querySelector('.reaction-palette') : null;
        closeReactionPalettes();
        if (existing) return;  // a second click on the same button toggles the palette off
        // #95: the reaction targets the bubble's OWN dialog, captured here at palette time.
        const bubbleDialog = bubble ? bubble.dataset.dialog : '';
        const palette = document.createElement('span');
        palette.className = 'reaction-palette';
        REACTION_PRESETS.forEach((emoji) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.textContent = emoji;
          b.addEventListener('click', (ev) => {
            ev.stopPropagation();
            closeReactionPalettes();
            postReaction(reactBtn.dataset.react, emoji, bubbleDialog);
          });
          palette.appendChild(b);
        });
        reactBtn.insertAdjacentElement('afterend', palette);
        return;
      }
      if (!e.target.closest('.reaction-palette')) closeReactionPalettes();  // click elsewhere closes it
    });
    // Suggest: fetch a draft for the open dialog and drop it into the composer.
    document.getElementById('suggest-btn').addEventListener('click', async () => {
      const id = document.getElementById('dialog_id').value;
      if (!id) return;
      const btn = document.getElementById('suggest-btn');
      const error = document.getElementById('suggest-error');
      btn.disabled = true;
      error.textContent = '';
      try {
        const resp = await fetch('/dialogs/' + encodeURIComponent(id) + '/suggest', {
          method: 'POST',
          headers: { 'X-TG-Messenger-CSRF': '1' }
        });
        const text = await resp.text();
        if (resp.ok) {
          document.getElementById('composer-text').value = text;
          const state = currentState();
          if (state) state.draft = text;
        } else {
          const doc = new DOMParser().parseFromString(text, 'text/html');
          error.textContent = (doc.body.textContent || '').trim() || 'Suggest failed.';
        }
      } catch (err) {
        error.textContent = 'Suggest failed.';
      } finally {
        btn.disabled = false;
      }
    });
    // Reply (#48): clicking ↩ on a message targets it; the composer submits reply_to.
    const replyToInput = document.getElementById('reply_to');
    const replyBanner = document.getElementById('reply-banner');
    const replyBannerText = document.getElementById('reply-banner-text');
    function setReply(messageId) {
      replyToInput.value = messageId;
      replyBannerText.textContent = 'Replying to #' + messageId;
      replyBanner.style.display = 'block';
      document.getElementById('composer-text').focus();
    }
    function clearReply() {
      replyToInput.value = '';
      replyBanner.style.display = 'none';
    }
    // #89: the success-path reply-clear shared by the send (afterRequest) and media (attach)
    // paths — clear the banner only if the user hasn't picked a NEWER reply target while the
    // send/upload was in flight (compare against the target snapshotted when it started).
    function clearReplyIfConsumed(oldReplyTo) {
      if (replyToInput.value === oldReplyTo) clearReply();
    }
    document.getElementById('messages').addEventListener('click', (e) => {
      const btn = e.target.closest('.reply-btn');
      if (!btn) return;
      // #95 defense-in-depth: reply targets the composer (which sends to the active dialog),
      // so ignore a click on a stale bubble belonging to a different dialog — otherwise the
      // banner would set a reply_to that doesn't exist in the now-active chat.
      const bubble = btn.closest('.msg');
      const bubbleDialog = bubble ? bubble.dataset.dialog : '';
      if (bubbleDialog && bubbleDialog !== document.getElementById('dialog_id').value) return;
      setReply(btn.dataset.reply);
    });
    document.getElementById('reply-cancel').addEventListener('click', clearReply);
    const composer = document.getElementById('composer');
    const composerText = document.getElementById('composer-text');
    const dialogInput = document.getElementById('dialog_id');
    const outboundNonce = document.getElementById('outbound_nonce');
    const variantPanel = document.getElementById('variant-panel');
    const suggestError = document.getElementById('suggest-error');
    const composeStates = new Map();
    let activeDialogId = dialogInput.value || '';
    let outboundController = null;

    // Disable the composer in a read-only chat (mirrors the real Telegram client).
    // Driven by data-can-send on the dialog <li>; the server also enforces it (403).
    function setComposerEnabled(canSend) {
      const ro = !canSend;
      composerText.disabled = ro;
      composerText.placeholder = ro ? 'Только чтение' : 'Message…';
      const suggestBtn = document.getElementById('suggest-btn');
      const attachFile = document.getElementById('attach-file');
      if (suggestBtn) suggestBtn.disabled = ro;
      if (attachFile) attachFile.disabled = ro;
      // #86: react buttons are intentionally NOT disabled here — reactions are allowed in a
      // read-only chat even though posting text/media is not.
    }

    function blankComposeState(dialogId) {
      return { dialogId, draft: '', outboundNonce: '', outboundReady: false };
    }
    function stateFor(dialogId) {
      if (!composeStates.has(dialogId)) {
        composeStates.set(dialogId, blankComposeState(dialogId));
      }
      return composeStates.get(dialogId);
    }
    function currentState() {
      return activeDialogId ? stateFor(activeDialogId) : null;
    }
    function hideVariants() {
      variantPanel.style.display = 'none';
      variantPanel.textContent = '';
    }
    function applyComposeState(state) {
      composerText.value = state.draft || '';
      outboundNonce.value = state.outboundNonce || '';
      composer.dataset.outboundReady = state.outboundReady ? '1' : '';
    }
    function markSubmittingDialog(id) {
      composer.dataset.submittingDialogId = id;
      // #48: snapshot the reply target this send carries, so afterRequest only clears it
      // when the user hasn't picked a newer target while the send was in flight.
      composer.dataset.submittingReplyTo = replyToInput.value;
    }
    function saveComposeState() {
      if (!activeDialogId) return;
      const state = stateFor(activeDialogId);
      state.draft = composerText.value;
      state.outboundNonce = outboundNonce.value;
      state.outboundReady = composer.dataset.outboundReady === '1';
    }
    function clearOutboundState(state) {
      state.outboundNonce = '';
      state.outboundReady = false;
      if (state.dialogId === activeDialogId) {
        outboundNonce.value = '';
        composer.dataset.outboundReady = '';
        hideVariants();
      }
    }
    function clearComposeState(state) {
      state.draft = '';
      clearOutboundState(state);
      if (state.dialogId === activeDialogId) {
        composerText.value = '';
      }
    }
    function restoreComposeState(dialogId) {
      activeDialogId = dialogId;
      dialogInput.value = dialogId;
      if (outboundController) outboundController.abort();
      const state = stateFor(dialogId);
      applyComposeState(state);
      hideVariants();
      clearReply();  // #48: a reply target doesn't carry across dialogs
      suggestError.textContent = '';
    }
    function showSendOriginal(dialogId, draft, message, sendOriginal) {
      const state = stateFor(dialogId);
      state.draft = draft;
      state.outboundNonce = '';
      state.outboundReady = false;
      if (dialogId === activeDialogId) {
        composerText.value = draft;
        outboundNonce.value = '';
        composer.dataset.outboundReady = '';
      }
      variantPanel.textContent = '';
      variantPanel.style.display = 'block';
      const line = document.createElement('div');
      line.textContent = message || 'Translation failed.';
      variantPanel.appendChild(line);
      const original = document.createElement('button');
      original.type = 'button';
      original.className = 'variant-card';
      original.textContent = 'Send original';
      original.addEventListener('click', () => {
        if (state.dialogId !== activeDialogId) return;
        state.draft = draft;
        state.outboundNonce = '';
        state.outboundReady = true;
        applyComposeState(state);
        hideVariants();
        sendOriginal();
      });
      variantPanel.appendChild(original);
    }

    composerText.addEventListener('input', () => {
      const state = currentState();
      if (!state) return;
      const previousDraft = state.draft;
      state.draft = composerText.value;
      if (!composerText.value) {
        clearOutboundState(state);
      } else if (state.outboundReady && composerText.value !== previousDraft) {
        clearOutboundState(state);
      }
    });
    composer.addEventListener('htmx:afterRequest', (evt) => {
      if (evt.detail.xhr && evt.detail.xhr.status >= 400) return;
      const submittedDialogId = composer.dataset.submittingDialogId || activeDialogId;
      const submittedReplyTo = composer.dataset.submittingReplyTo || '';
      delete composer.dataset.submittingDialogId;
      delete composer.dataset.submittingReplyTo;
      if (submittedDialogId) {
        clearComposeState(stateFor(submittedDialogId));
      }
      if (submittedDialogId === activeDialogId) {
        // #48: clear the reply only for the dialog whose send just completed AND only if
        // the target hasn't changed since — if the user picked a newer target in the same
        // dialog before this (slow) send returned, that newer selection must survive (the
        // banner would otherwise desync from what the next send actually carries).
        // Capture the surviving target BEFORE reset() wipes the hidden field.
        const survivingReply = replyToInput.value === submittedReplyTo ? '' : replyToInput.value;
        clearReplyIfConsumed(submittedReplyTo);  // #89 shared helper — banner gone if consumed
        composer.reset();  // blanks composer-text AND the hidden reply_to field
        dialogInput.value = activeDialogId;
        if (survivingReply) {
          replyToInput.value = survivingReply;  // re-apply the newer target reset() wiped
        }
      } else if (activeDialogId) {
        applyComposeState(stateFor(activeDialogId));
        dialogInput.value = activeDialogId;
      }
      const clientInput = document.getElementById('web_client_id');
      clientInput.value = webClientId;
      clientInput.defaultValue = webClientId;
    });
    composer.addEventListener('htmx:confirm', async (evt) => {
      const id = dialogInput.value;
      if (!id) return;
      activeDialogId = id;
      const state = stateFor(id);
      const draft = composerText.value;
      if (!draft.trim()) return;
      if (state.outboundReady && state.dialogId === activeDialogId && state.draft === draft) {
        state.outboundReady = false;
        composer.dataset.outboundReady = '';
        hideVariants();
        markSubmittingDialog(id);
        return;
      }
      evt.preventDefault();
      state.draft = draft;
      const fd = new FormData();
      fd.append('text', draft);
      fd.append('web_client_id', webClientId);
      const sendBtn = composer.querySelector('button[type="submit"]');
      if (sendBtn) sendBtn.disabled = true;
      if (outboundController) outboundController.abort();
      outboundController = new AbortController();
      const outboundTimer = setTimeout(() => outboundController.abort(), 15000);
      try {
        const resp = await fetch('/dialogs/' + encodeURIComponent(id) + '/outbound', {
          method: 'POST',
          headers: { 'X-TG-Messenger-CSRF': '1' },
          body: fd,
          signal: outboundController.signal
        });
        if (!resp.ok) {
          throw new Error('outbound request failed');
        }
        const data = await resp.json();
        if (data.status === 'disabled' || data.status === 'not_applicable') {
          clearOutboundState(state);
          markSubmittingDialog(id);
          evt.detail.issueRequest(true);
          return;
        }
        if (data.status === 'error' || !data.applies) {
          showSendOriginal(id, draft, data.error, () => {
            markSubmittingDialog(id);
            evt.detail.issueRequest(true);
          });
          return;
        }
        variantPanel.textContent = '';
        variantPanel.style.display = 'block';
        const title = document.createElement('div');
        title.textContent = 'Translate to ' + data.target_lang;
        variantPanel.appendChild(title);
        data.variants.forEach((variant) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'variant-card';
          btn.textContent = variant;
          btn.addEventListener('click', () => {
            if (state.dialogId !== activeDialogId) return;
            state.draft = variant;
            state.outboundNonce = data.nonce || '';
            state.outboundReady = true;
            applyComposeState(state);
            hideVariants();
            composerText.focus();
          });
          variantPanel.appendChild(btn);
        });
        const original = document.createElement('button');
        original.type = 'button';
        original.className = 'variant-card';
        original.textContent = 'Send original';
        original.addEventListener('click', () => {
          if (state.dialogId !== activeDialogId) return;
          state.draft = draft;
          state.outboundNonce = '';
          state.outboundReady = true;
          applyComposeState(state);
          hideVariants();
          markSubmittingDialog(id);
          evt.detail.issueRequest(true);
        });
        variantPanel.appendChild(original);
      } catch (err) {
        showSendOriginal(id, draft, 'Translation failed.', () => {
          markSubmittingDialog(id);
          evt.detail.issueRequest(true);
        });
      } finally {
        clearTimeout(outboundTimer);
        outboundController = null;
        if (sendBtn) sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
