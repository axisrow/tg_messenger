<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>tg_messenger</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; }
    #dialogs { width: 300px; border-right: 1px solid #ccc; overflow-y: auto; }
    #dialogs ul { list-style: none; margin: 0; padding: 0; }
    #dialogs li { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    #dialogs li:hover { background: #f3f3f3; }
    .unread { background: #2481cc; color: #fff; border-radius: 10px; padding: 0 6px; font-size: 12px; }
    #chat { flex: 1; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 12px; }
    .msg { max-width: 60%; margin: 4px 0; padding: 8px 12px; border-radius: 12px; }
    .msg.in { background: #eee; }
    .msg.out { background: #cfe9ff; margin-left: auto; }
    #composer { display: flex; border-top: 1px solid #ccc; padding: 8px; }
    #composer input { flex: 1; padding: 8px; }
  </style>
</head>
<body>
  <aside id="dialogs">
    <ul hx-get="/dialogs" hx-trigger="load" hx-target="#dialogs ul" hx-swap="innerHTML"></ul>
  </aside>
  <main id="chat">
    <div id="messages"></div>
    <form id="composer" hx-post="/send" hx-target="#messages" hx-swap="beforeend"
          hx-on::after-request="this.reset()">
      <input type="hidden" name="dialog_id" id="dialog_id" value="">
      <input type="text" name="text" placeholder="Message…" autocomplete="off">
    </form>
  </main>
  <script>
    // Track selected dialog id from clicks on the list, wire SSE for incoming.
    let es = null;
    document.body.addEventListener('click', (e) => {
      const li = e.target.closest('#dialogs li');
      if (!li) return;
      const id = li.textContent.trim().split(' ')[0];
      document.getElementById('dialog_id').value = id;
      if (es) es.close();
      es = new EventSource('/stream/' + id);
      es.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        const div = document.createElement('div');
        div.className = 'msg in';
        div.textContent = data.text || '<media>';
        document.getElementById('messages').appendChild(div);
      };
    });
  </script>
</body>
</html>
