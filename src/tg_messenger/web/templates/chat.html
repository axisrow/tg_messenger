<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>tg_messenger</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; }
    #dialogs { width: 300px; border-right: 1px solid #ccc; overflow-y: auto; }
    #tabs { display: flex; border-bottom: 1px solid #ccc; }
    #tabs .tab { flex: 1; padding: 8px; border: none; background: #f7f7f7; cursor: pointer; }
    #tabs .tab.active { background: #fff; font-weight: bold; border-bottom: 2px solid #2481cc; }
    #dialogs ul { list-style: none; margin: 0; padding: 0; }
    #dialogs li { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    #dialogs li:hover { background: #f3f3f3; }
    .unread { background: #2481cc; color: #fff; border-radius: 10px; padding: 0 6px; font-size: 12px; }
    #chat { flex: 1; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 12px; }
    .msg { max-width: 60%; margin: 4px 0; padding: 8px 12px; border-radius: 12px; }
    .msg.in { background: #eee; }
    .msg.out { background: #cfe9ff; margin-left: auto; }
    #composer { display: flex; border-top: 1px solid #ccc; padding: 8px; }
    #composer input { flex: 1; padding: 8px; }
  </style>
</head>
<body>
  <aside id="dialogs">
    <nav id="tabs">
      <button class="tab active" hx-get="/dialogs?tab=dm"
              hx-target="#dialogs ul" hx-swap="innerHTML"
              hx-on:click="document.getElementById('dialog-search').value=''">DM</button>
      <button class="tab" hx-get="/dialogs?tab=groups"
              hx-target="#dialogs ul" hx-swap="innerHTML"
              hx-on:click="document.getElementById('dialog-search').value=''">Группы</button>
    </nav>
    <input type="search" id="dialog-search" name="q" placeholder="Поиск диалогов…"
           autocomplete="off"
           hx-get="/dialogs" hx-trigger="input changed delay:200ms, search"
           hx-include="#current-tab" hx-target="#dialogs ul" hx-swap="innerHTML">
    <input type="hidden" id="current-tab" name="tab" value="dm">
    <ul hx-get="/dialogs" hx-trigger="load" hx-target="#dialogs ul" hx-swap="innerHTML"></ul>
  </aside>
  <main id="chat">
    <div id="messages"></div>
    <form id="composer" hx-post="/send" hx-target="#messages" hx-swap="beforeend"
          hx-on::after-request="this.reset()">
      <input type="hidden" name="dialog_id" id="dialog_id" value="">
      <input type="text" name="text" id="composer-text" placeholder="Message…" autocomplete="off" required>
      <button type="button" id="suggest-btn" title="Suggest a reply">💡 Suggest</button>
      <label id="attach-btn" title="Attach a file">📎
        <input type="file" id="attach-file" style="display:none">
      </label>
    </form>
  </main>
  <script>
    // Highlight the active dialog-list tab and remember it for the search box.
    document.getElementById('tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      document.querySelectorAll('#tabs .tab').forEach(t => t.classList.toggle('active', t === tab));
      const hx = tab.getAttribute('hx-get') || '';
      document.getElementById('current-tab').value = hx.includes('groups') ? 'groups' : 'dm';
    });
    // Track selected dialog id from clicks on the list, wire SSE for incoming.
    let es = null;
    document.body.addEventListener('click', (e) => {
      const li = e.target.closest('#dialogs li');
      if (!li) return;
      const id = li.textContent.trim().split(' ')[0];
      document.getElementById('dialog_id').value = id;
      if (es) es.close();
      es = new EventSource('/stream/' + id);
      es.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        const div = document.createElement('div');
        div.className = 'msg in';
        div.textContent = data.text || '<media>';
        document.getElementById('messages').appendChild(div);
      };
    });
    // Attach a file: upload it as media to the open dialog, append the bubble.
    document.getElementById('attach-file').addEventListener('change', async (e) => {
      const id = document.getElementById('dialog_id').value;
      const file = e.target.files[0];
      if (!id || !file) { e.target.value = ''; return; }
      const fd = new FormData();
      fd.append('file', file);
      fd.append('caption', document.getElementById('composer-text').value);
      const resp = await fetch('/dialogs/' + id + '/media', { method: 'POST', body: fd });
      const html = await resp.text();
      if (resp.ok) {
        document.getElementById('messages').insertAdjacentHTML('beforeend', html);
        document.getElementById('composer-text').value = '';
      } else {
        alert(html.replace(/<[^>]+>/g, '').trim() || 'Upload failed');
      }
      e.target.value = '';
    });
    // Suggest: fetch a draft for the open dialog and drop it into the composer.
    document.getElementById('suggest-btn').addEventListener('click', async () => {
      const id = document.getElementById('dialog_id').value;
      if (!id) return;
      const btn = document.getElementById('suggest-btn');
      btn.disabled = true;
      try {
        const resp = await fetch('/dialogs/' + id + '/suggest');
        const text = await resp.text();
        if (resp.ok) document.getElementById('composer-text').value = text;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
