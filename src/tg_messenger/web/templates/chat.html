<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>tg_messenger</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; }
    #dialogs { width: 300px; border-right: 1px solid #ccc; overflow-y: auto; }
    #tabs { display: flex; border-bottom: 1px solid #ccc; }
    #tabs .tab { flex: 1; padding: 8px; border: none; background: #f7f7f7; cursor: pointer; }
    #tabs .tab.active { background: #fff; font-weight: bold; border-bottom: 2px solid #2481cc; }
    #dialogs ul { list-style: none; margin: 0; padding: 0; }
    #dialogs li { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    #dialogs li:hover { background: #f3f3f3; }
    .unread { background: #2481cc; color: #fff; border-radius: 10px; padding: 0 6px; font-size: 12px; }
    #chat { flex: 1; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 12px; }
    .msg { max-width: 60%; margin: 4px 0; padding: 8px 12px; border-radius: 12px; }
    .msg.in { background: #eee; }
    .msg.out { background: #cfe9ff; margin-left: auto; }
    .msg.reaction { background: #fff7d6; color: #6b5700; font-size: 13px; }
    .translation { margin-top: 4px; color: #555; font-size: 13px; }
    #composer { display: flex; border-top: 1px solid #ccc; padding: 8px; }
    #composer input { flex: 1; padding: 8px; }
    #reaction-form { display: flex; gap: 6px; border-top: 1px solid #eee; padding: 8px; }
    #reaction-form input[name="message_id"] { width: 90px; }
    #reaction-form input[name="emoticon"] { width: 70px; }
    #suggest-error { color: #b00020; padding: 0 8px; align-self: center; font-size: 12px; }
    #variant-panel { border-top: 1px solid #ddd; padding: 8px; display: none; }
    .variant-card { display: block; width: 100%; text-align: left; margin: 4px 0; padding: 8px; }
  </style>
</head>
<body>
  <aside id="dialogs">
    <nav id="tabs">
      <button class="tab active" hx-get="/dialogs?tab=dm"
              hx-target="#dialogs ul" hx-swap="innerHTML"
              hx-on:click="document.getElementById('dialog-search').value=''">DM</button>
      <button class="tab" hx-get="/dialogs?tab=groups"
              hx-target="#dialogs ul" hx-swap="innerHTML"
              hx-on:click="document.getElementById('dialog-search').value=''">Группы</button>
    </nav>
    <input type="search" id="dialog-search" name="q" placeholder="Поиск диалогов…"
           autocomplete="off"
           hx-get="/dialogs" hx-trigger="input changed delay:200ms, search"
           hx-include="#current-tab" hx-target="#dialogs ul" hx-swap="innerHTML">
    <input type="hidden" id="current-tab" name="tab" value="dm">
    <ul hx-get="/dialogs" hx-trigger="load" hx-target="#dialogs ul" hx-swap="innerHTML"></ul>
  </aside>
  <main id="chat">
    <div id="messages"></div>
    <div id="lang-settings" hx-get="/settings/lang" hx-trigger="load" hx-swap="innerHTML"></div>
    <div id="variant-panel" role="status"></div>
    <div id="reply-banner" style="display:none; padding: 4px 8px; font-size: 12px; color: #555; border-top: 1px solid #eee;">
      <span id="reply-banner-text"></span>
      <button type="button" id="reply-cancel" title="Cancel reply">✕</button>
    </div>
    <form id="composer" hx-post="/send" hx-target="#messages" hx-swap="beforeend">
      <input type="hidden" name="dialog_id" id="dialog_id" value="">
      <input type="hidden" name="web_client_id" id="web_client_id" value="">
      <input type="hidden" name="outbound_nonce" id="outbound_nonce" value="">
      <input type="hidden" name="reply_to" id="reply_to" value="">
      <input type="text" name="text" id="composer-text" placeholder="Message…" autocomplete="off" required>
      <button type="button" id="suggest-btn" title="Suggest a reply">💡 Suggest</button>
      <label id="attach-btn" title="Attach a file">📎
        <input type="file" id="attach-file" style="display:none">
      </label>
      <span id="suggest-error" role="status"></span>
    </form>
    <form id="reaction-form">
      <input type="text" name="message_id" placeholder="Message id" inputmode="numeric" autocomplete="off">
      <input type="text" name="emoticon" placeholder="👍" autocomplete="off">
      <button type="submit">React</button>
    </form>
  </main>
  <script>
    const webClientId = (() => {
      let id = sessionStorage.getItem('tgMessengerClientId');
      if (!id) {
        id = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
        sessionStorage.setItem('tgMessengerClientId', id);
      }
      const clientInput = document.getElementById('web_client_id');
      clientInput.value = id;
      clientInput.defaultValue = id;
      return id;
    })();
    // Highlight the active dialog-list tab and remember it for the search box.
    document.getElementById('tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      document.querySelectorAll('#tabs .tab').forEach(t => t.classList.toggle('active', t === tab));
      const hx = tab.getAttribute('hx-get') || '';
      document.getElementById('current-tab').value = hx.includes('groups') ? 'groups' : 'dm';
    });
    // Track selected dialog id from clicks on the list, wire SSE for incoming.
    let es = null;
    document.body.addEventListener('click', (e) => {
      const li = e.target.closest('#dialogs li');
      if (!li) return;
      const id = li.textContent.trim().split(' ')[0];
      saveComposeState();
      restoreComposeState(id);
      if (es) es.close();
      es = new EventSource('/stream/' + encodeURIComponent(id) +
                           '?client_id=' + encodeURIComponent(webClientId));
      es.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        const div = document.createElement('div');
        if (data.type === 'reaction') {
          div.className = 'msg reaction';
          div.textContent = 'reaction [' + data.message_id + ']: ' + (data.emoticon || '<custom>');
          document.getElementById('messages').appendChild(div);
          return;
        }
        if (data.type === 'translation') {
          const msg = document.querySelector('.msg[data-id="' + CSS.escape(String(data.message_id)) + '"]');
          if (msg && !msg.querySelector('.translation')) {
            const line = document.createElement('div');
            line.className = 'translation';
            line.textContent = '↳ ' + data.text;
            msg.appendChild(line);
          }
          return;
        }
        // our own messages (sent from another device) render on the right
        div.className = data.out ? 'msg out' : 'msg in';
        div.dataset.id = data.id;
        div.textContent = '[' + data.id + '] ' + (data.text || '<media>');
        document.getElementById('messages').appendChild(div);
      };
    });
    // Attach a file: upload it as media to the open dialog, append the bubble.
    document.getElementById('attach-file').addEventListener('change', async (e) => {
      const id = document.getElementById('dialog_id').value;
      const file = e.target.files[0];
      if (!id || !file) { e.target.value = ''; return; }
      const fd = new FormData();
      fd.append('file', file);
      fd.append('caption', document.getElementById('composer-text').value);
      fd.append('web_client_id', webClientId);
      const resp = await fetch('/dialogs/' + id + '/media', { method: 'POST', body: fd });
      const html = await resp.text();
      if (resp.ok) {
        document.getElementById('messages').insertAdjacentHTML('beforeend', html);
        document.getElementById('composer-text').value = '';
        const state = currentState();
        if (state) clearComposeState(state);
      } else {
        alert(html.replace(/<[^>]+>/g, '').trim() || 'Upload failed');
      }
      e.target.value = '';
    });
    // React by message id. Message ids are rendered in each bubble as [id].
    document.getElementById('reaction-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('dialog_id').value;
      if (!id) return;
      const fd = new FormData(e.target);
      fd.append('web_client_id', webClientId);
      const resp = await fetch('/dialogs/' + encodeURIComponent(id) + '/reaction', {
        method: 'POST',
        body: fd
      });
      const html = await resp.text();
      if (resp.ok) {
        document.getElementById('messages').insertAdjacentHTML('beforeend', html);
        e.target.reset();
      } else {
        alert(html.replace(/<[^>]+>/g, '').trim() || 'Reaction failed');
      }
    });
    // Suggest: fetch a draft for the open dialog and drop it into the composer.
    document.getElementById('suggest-btn').addEventListener('click', async () => {
      const id = document.getElementById('dialog_id').value;
      if (!id) return;
      const btn = document.getElementById('suggest-btn');
      const error = document.getElementById('suggest-error');
      btn.disabled = true;
      error.textContent = '';
      try {
        const resp = await fetch('/dialogs/' + encodeURIComponent(id) + '/suggest', {
          method: 'POST',
          headers: { 'X-TG-Messenger-CSRF': '1' }
        });
        const text = await resp.text();
        if (resp.ok) {
          document.getElementById('composer-text').value = text;
          const state = currentState();
          if (state) state.draft = text;
        } else {
          const doc = new DOMParser().parseFromString(text, 'text/html');
          error.textContent = (doc.body.textContent || '').trim() || 'Suggest failed.';
        }
      } catch (err) {
        error.textContent = 'Suggest failed.';
      } finally {
        btn.disabled = false;
      }
    });
    // Reply (#48): clicking ↩ on a message targets it; the composer submits reply_to.
    const replyToInput = document.getElementById('reply_to');
    const replyBanner = document.getElementById('reply-banner');
    const replyBannerText = document.getElementById('reply-banner-text');
    function setReply(messageId) {
      replyToInput.value = messageId;
      replyBannerText.textContent = 'Replying to #' + messageId;
      replyBanner.style.display = 'block';
      document.getElementById('composer-text').focus();
    }
    function clearReply() {
      replyToInput.value = '';
      replyBanner.style.display = 'none';
    }
    document.getElementById('messages').addEventListener('click', (e) => {
      const btn = e.target.closest('.reply-btn');
      if (!btn) return;
      setReply(btn.dataset.reply);
    });
    document.getElementById('reply-cancel').addEventListener('click', clearReply);
    const composer = document.getElementById('composer');
    const composerText = document.getElementById('composer-text');
    const dialogInput = document.getElementById('dialog_id');
    const outboundNonce = document.getElementById('outbound_nonce');
    const variantPanel = document.getElementById('variant-panel');
    const suggestError = document.getElementById('suggest-error');
    const composeStates = new Map();
    let activeDialogId = dialogInput.value || '';
    let outboundController = null;

    function blankComposeState(dialogId) {
      return { dialogId, draft: '', outboundNonce: '', outboundReady: false };
    }
    function stateFor(dialogId) {
      if (!composeStates.has(dialogId)) {
        composeStates.set(dialogId, blankComposeState(dialogId));
      }
      return composeStates.get(dialogId);
    }
    function currentState() {
      return activeDialogId ? stateFor(activeDialogId) : null;
    }
    function hideVariants() {
      variantPanel.style.display = 'none';
      variantPanel.textContent = '';
    }
    function applyComposeState(state) {
      composerText.value = state.draft || '';
      outboundNonce.value = state.outboundNonce || '';
      composer.dataset.outboundReady = state.outboundReady ? '1' : '';
    }
    function markSubmittingDialog(id) {
      composer.dataset.submittingDialogId = id;
    }
    function saveComposeState() {
      if (!activeDialogId) return;
      const state = stateFor(activeDialogId);
      state.draft = composerText.value;
      state.outboundNonce = outboundNonce.value;
      state.outboundReady = composer.dataset.outboundReady === '1';
    }
    function clearOutboundState(state) {
      state.outboundNonce = '';
      state.outboundReady = false;
      if (state.dialogId === activeDialogId) {
        outboundNonce.value = '';
        composer.dataset.outboundReady = '';
        hideVariants();
      }
    }
    function clearComposeState(state) {
      state.draft = '';
      clearOutboundState(state);
      if (state.dialogId === activeDialogId) {
        composerText.value = '';
      }
    }
    function restoreComposeState(dialogId) {
      activeDialogId = dialogId;
      dialogInput.value = dialogId;
      if (outboundController) outboundController.abort();
      const state = stateFor(dialogId);
      applyComposeState(state);
      hideVariants();
      clearReply();  // #48: a reply target doesn't carry across dialogs
      suggestError.textContent = '';
    }
    function showSendOriginal(dialogId, draft, message, sendOriginal) {
      const state = stateFor(dialogId);
      state.draft = draft;
      state.outboundNonce = '';
      state.outboundReady = false;
      if (dialogId === activeDialogId) {
        composerText.value = draft;
        outboundNonce.value = '';
        composer.dataset.outboundReady = '';
      }
      variantPanel.textContent = '';
      variantPanel.style.display = 'block';
      const line = document.createElement('div');
      line.textContent = message || 'Translation failed.';
      variantPanel.appendChild(line);
      const original = document.createElement('button');
      original.type = 'button';
      original.className = 'variant-card';
      original.textContent = 'Send original';
      original.addEventListener('click', () => {
        if (state.dialogId !== activeDialogId) return;
        state.draft = draft;
        state.outboundNonce = '';
        state.outboundReady = true;
        applyComposeState(state);
        hideVariants();
        sendOriginal();
      });
      variantPanel.appendChild(original);
    }

    composerText.addEventListener('input', () => {
      const state = currentState();
      if (!state) return;
      const previousDraft = state.draft;
      state.draft = composerText.value;
      if (!composerText.value) {
        clearOutboundState(state);
      } else if (state.outboundReady && composerText.value !== previousDraft) {
        clearOutboundState(state);
      }
    });
    composer.addEventListener('htmx:afterRequest', (evt) => {
      if (evt.detail.xhr && evt.detail.xhr.status >= 400) return;
      const submittedDialogId = composer.dataset.submittingDialogId || activeDialogId;
      delete composer.dataset.submittingDialogId;
      if (submittedDialogId) {
        clearComposeState(stateFor(submittedDialogId));
      }
      if (submittedDialogId === activeDialogId) {
        // #48: clear the reply only for the dialog whose send just completed — if the
        // user switched dialogs mid-flight and picked a new reply target there, an older
        // send must not wipe it (the banner would otherwise desync from the sent message).
        clearReply();
        composer.reset();
        dialogInput.value = activeDialogId;
      } else if (activeDialogId) {
        applyComposeState(stateFor(activeDialogId));
        dialogInput.value = activeDialogId;
      }
      const clientInput = document.getElementById('web_client_id');
      clientInput.value = webClientId;
      clientInput.defaultValue = webClientId;
    });
    composer.addEventListener('htmx:confirm', async (evt) => {
      const id = dialogInput.value;
      if (!id) return;
      activeDialogId = id;
      const state = stateFor(id);
      const draft = composerText.value;
      if (!draft.trim()) return;
      if (state.outboundReady && state.dialogId === activeDialogId && state.draft === draft) {
        state.outboundReady = false;
        composer.dataset.outboundReady = '';
        hideVariants();
        markSubmittingDialog(id);
        return;
      }
      evt.preventDefault();
      state.draft = draft;
      const fd = new FormData();
      fd.append('text', draft);
      fd.append('web_client_id', webClientId);
      const sendBtn = composer.querySelector('button[type="submit"]');
      if (sendBtn) sendBtn.disabled = true;
      if (outboundController) outboundController.abort();
      outboundController = new AbortController();
      const outboundTimer = setTimeout(() => outboundController.abort(), 15000);
      try {
        const resp = await fetch('/dialogs/' + encodeURIComponent(id) + '/outbound', {
          method: 'POST',
          headers: { 'X-TG-Messenger-CSRF': '1' },
          body: fd,
          signal: outboundController.signal
        });
        if (!resp.ok) {
          throw new Error('outbound request failed');
        }
        const data = await resp.json();
        if (data.status === 'disabled' || data.status === 'not_applicable') {
          clearOutboundState(state);
          markSubmittingDialog(id);
          evt.detail.issueRequest(true);
          return;
        }
        if (data.status === 'error' || !data.applies) {
          showSendOriginal(id, draft, data.error, () => {
            markSubmittingDialog(id);
            evt.detail.issueRequest(true);
          });
          return;
        }
        variantPanel.textContent = '';
        variantPanel.style.display = 'block';
        const title = document.createElement('div');
        title.textContent = 'Translate to ' + data.target_lang;
        variantPanel.appendChild(title);
        data.variants.forEach((variant) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'variant-card';
          btn.textContent = variant;
          btn.addEventListener('click', () => {
            if (state.dialogId !== activeDialogId) return;
            state.draft = variant;
            state.outboundNonce = data.nonce || '';
            state.outboundReady = true;
            applyComposeState(state);
            hideVariants();
            composerText.focus();
          });
          variantPanel.appendChild(btn);
        });
        const original = document.createElement('button');
        original.type = 'button';
        original.className = 'variant-card';
        original.textContent = 'Send original';
        original.addEventListener('click', () => {
          if (state.dialogId !== activeDialogId) return;
          state.draft = draft;
          state.outboundNonce = '';
          state.outboundReady = true;
          applyComposeState(state);
          hideVariants();
          markSubmittingDialog(id);
          evt.detail.issueRequest(true);
        });
        variantPanel.appendChild(original);
      } catch (err) {
        showSendOriginal(id, draft, 'Translation failed.', () => {
          markSubmittingDialog(id);
          evt.detail.issueRequest(true);
        });
      } finally {
        clearTimeout(outboundTimer);
        outboundController = null;
        if (sendBtn) sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
