<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tg_messenger — login</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; height: 100vh;
           align-items: center; justify-content: center; margin: 0; background: #f7f7f7; }
    form { background: #fff; padding: 24px; border-radius: 12px;
           box-shadow: 0 2px 12px rgba(0,0,0,.08); display: flex; flex-direction: column; gap: 12px; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    input[type=password] { padding: 8px; font-size: 15px; }
    button { padding: 8px; background: #2481cc; color: #fff; border: none;
             border-radius: 6px; cursor: pointer; font-size: 15px; }
    .error { color: #c0392b; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <form method="post" action="/login">
    <h1>tg_messenger</h1>
    {% if error %}<p class="error" role="alert">{{ error }}</p>{% endif %}
    <label for="password">Password</label>
    <input id="password" type="password" name="password" autofocus autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
