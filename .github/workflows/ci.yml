name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Core + UI suite on the supported Python range. Tests need no network
  # (conftest fakes the Telethon seam) and no secrets; agent tests skip here
  # via importorskip — they run in the `agent` job below.
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # 3.12 catches the eager_task_factory class of problems (see tui/app.py)
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  # Optional: install the agent extra so the importorskip-guarded agent tests
  # actually run (they skip on the plain [dev] install by design — CLAUDE.md).
  agent:
    name: agent tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,agent]"
      - run: pytest -q
